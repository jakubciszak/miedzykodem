<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="860" height="400" fill="url(#bg1)" rx="12"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="700">TDD z agentem AI — kto odpowiada za którą fazę?</text>
  <text x="430" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Na podstawie 12 praktyk XP [1] i frameworka AutoGen [5]</text>

  <!-- RED circle -->
  <circle cx="165" cy="190" r="78" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2.5"/>
  <text x="165" y="172" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="800">RED</text>
  <text x="165" y="195" text-anchor="middle" fill="#fca5a5" font-size="11">Zdefiniuj oczekiwanie</text>
  <text x="165" y="212" text-anchor="middle" fill="#fca5a5" font-size="11">Napisz failing test</text>

  <!-- Human badge -->
  <rect x="110" y="278" width="110" height="26" rx="13" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.5"/>
  <text x="165" y="296" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">CZŁOWIEK</text>
  <text x="165" y="318" text-anchor="middle" fill="#94a3b8" font-size="10">Wymaga wiedzy domenowej</text>
  <text x="165" y="333" text-anchor="middle" fill="#94a3b8" font-size="10">i kontekstu biznesowego</text>

  <!-- Arrow RED → GREEN -->
  <line x1="248" y1="172" x2="345" y2="172" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="345,168 355,172 345,176" fill="#475569"/>
  <text x="300" y="164" text-anchor="middle" fill="#64748b" font-size="9">test fails</text>

  <!-- GREEN circle -->
  <circle cx="430" cy="190" r="78" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="2.5"/>
  <text x="430" y="172" text-anchor="middle" fill="#22c55e" font-size="24" font-weight="800">GREEN</text>
  <text x="430" y="195" text-anchor="middle" fill="#86efac" font-size="11">Napisz implementację</text>
  <text x="430" y="212" text-anchor="middle" fill="#86efac" font-size="11">Test przechodzi</text>

  <!-- Agent badge -->
  <rect x="375" y="278" width="110" height="26" rx="13" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-opacity="0.5"/>
  <text x="430" y="296" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">AGENT AI</text>
  <text x="430" y="318" text-anchor="middle" fill="#94a3b8" font-size="10">Fenomenalny w generowaniu</text>
  <text x="430" y="333" text-anchor="middle" fill="#94a3b8" font-size="10">kodu spełniającego testy</text>

  <!-- Arrow GREEN → back to RED -->
  <path d="M 510 200 Q 560 200 560 260 Q 560 360 430 370 Q 165 380 100 270 Q 90 250 100 200" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="100,204 93,194 107,194" fill="#3b82f6"/>
  <text x="340" y="385" text-anchor="middle" fill="#60a5fa" font-size="10">nowy cykl → człowiek definiuje następne oczekiwanie</text>

  <!-- Right panel: warning -->
  <rect x="590" y="100" width="245" height="90" rx="8" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-opacity="0.25"/>
  <text x="600" y="122" fill="#fca5a5" font-size="12" font-weight="700">⚠ Antypattern:</text>
  <text x="600" y="142" fill="#94a3b8" font-size="11">Agent pisze testy do</text>
  <text x="600" y="158" fill="#94a3b8" font-size="11">własnego kodu = student</text>
  <text x="600" y="174" fill="#94a3b8" font-size="11">wystawiający sobie ocenę</text>

  <!-- Right panel: good pattern -->
  <rect x="590" y="210" width="245" height="90" rx="8" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-opacity="0.25"/>
  <text x="600" y="232" fill="#86efac" font-size="12" font-weight="700">✓ Wzorzec:</text>
  <text x="600" y="252" fill="#94a3b8" font-size="11">Ty definiujesz testy,</text>
  <text x="600" y="268" fill="#94a3b8" font-size="11">zgłębiając domenę.</text>
  <text x="600" y="284" fill="#94a3b8" font-size="11">Agent implementuje Green.</text>

  <!-- Footer -->
  <text x="430" y="397" text-anchor="middle" fill="#475569" font-size="9">miedzykodem.dev · Między kodem a kulturą · 2026</text>
</svg>
