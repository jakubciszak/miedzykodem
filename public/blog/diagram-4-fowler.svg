<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="860" height="360" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="700">Praktyka nr 13: Rozumiej to, co akceptujesz</text>
  <text x="430" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Kwadrant Fowlera [10] w erze agentów AI</text>

  <!-- Quadrant grid -->
  <!-- Axes -->
  <line x1="430" y1="75" x2="430" y2="310" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="190" x2="780" y2="190" stroke="#334155" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="430" y="70" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">ŚWIADOMY</text>
  <text x="430" y="325" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">NIEŚWIADOMY</text>
  <text x="72" y="194" text-anchor="end" fill="#94a3b8" font-size="10" font-weight="600">ROZWAŻNY</text>
  <text x="788" y="194" fill="#94a3b8" font-size="10" font-weight="600">LEKKOMYŚLNY</text>

  <!-- Q1: Rozważny-Świadomy (top-left) — OK -->
  <rect x="100" y="82" width="310" height="98" rx="8" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-opacity="0.3"/>
  <text x="255" y="104" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">ROZWAŻNY-ŚWIADOMY ✓</text>
  <text x="255" y="124" text-anchor="middle" fill="#94a3b8" font-size="11">Agent pisze kod</text>
  <text x="255" y="142" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Ty rozumiesz i akceptujesz kompromisy</text>
  <text x="255" y="162" text-anchor="middle" fill="#64748b" font-size="10">Świadoma decyzja z planem spłaty</text>

  <!-- Q2: Lekkomyślny-Świadomy (top-right) — Warning -->
  <rect x="450" y="82" width="310" height="98" rx="8" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-opacity="0.3"/>
  <text x="605" y="104" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">LEKKOMYŚLNY-ŚWIADOMY ⚠</text>
  <text x="605" y="124" text-anchor="middle" fill="#94a3b8" font-size="11">Agent pisze kod</text>
  <text x="605" y="142" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Ty klikasz "accept all"</text>
  <text x="605" y="162" text-anchor="middle" fill="#64748b" font-size="10">Wiesz, że powinieneś przeczytać. Nie czytasz.</text>

  <!-- Q3: Rozważny-Nieświadomy (bottom-left) — learning -->
  <rect x="100" y="200" width="310" height="98" rx="8" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-opacity="0.2"/>
  <text x="255" y="222" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">ROZWAŻNY-NIEŚWIADOMY</text>
  <text x="255" y="242" text-anchor="middle" fill="#94a3b8" font-size="11">"Teraz wiemy, jak powinniśmy</text>
  <text x="255" y="258" text-anchor="middle" fill="#94a3b8" font-size="11">byli to zrobić"</text>
  <text x="255" y="280" text-anchor="middle" fill="#64748b" font-size="10">Nieuniknione uczenie się — dług XP</text>

  <!-- Q4: Lekkomyślny-Nieświadomy (bottom-right) — DANGER -->
  <rect x="450" y="200" width="310" height="98" rx="8" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-opacity="0.4"/>
  <text x="605" y="222" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">LEKKOMYŚLNY-NIEŚWIADOMY ✗</text>
  <text x="605" y="242" text-anchor="middle" fill="#94a3b8" font-size="11">Agent pisze kod</text>
  <text x="605" y="258" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Nikt nie rozumie decyzji architektonicznych</text>
  <text x="605" y="280" text-anchor="middle" fill="#fca5a5" font-size="10">Skala, jakiej Fowler nie przewidział w 2009</text>

  <!-- Danger arrow -->
  <path d="M 760 170 Q 790 190 760 220" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="758,220 766,226 764,216" fill="#ef4444"/>
  <text x="810" y="198" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">vibe</text>
  <text x="810" y="210" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">coding</text>

  <!-- Footer -->
  <text x="430" y="352" text-anchor="middle" fill="#475569" font-size="9">miedzykodem.dev · Między kodem a kulturą · 2026</text>
</svg>
