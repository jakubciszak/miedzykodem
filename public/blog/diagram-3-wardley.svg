  <rect x="645" y="90" width="195" height="260" rx="8" fill="#f59e0b" opacity="0.05" stroke="#f59e0b" stroke-opacity="0.15"/>
  <text x="742" y="112" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">COMMODITY</text>
