  <text x="660" y="155" fill="#fca5a5" font-size="11" font-weight="600">✗ Agent ograniczony</text>
  <text x="660" y="172" fill="#94a3b8" font-size="10">Problem = wyparowana wiedza</text>
  <text x="660" y="195" fill="#fca5a5" font-size="11" font-weight="600">↻ On-site customer + Metaphor</text>
