  <rect x="660" y="232" width="165" height="22" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="742" y="247" text-anchor="middle" fill="#fee2e2" font-size="10" font-weight="600">Ryzyko agenta: KRYTYCZNE</text>

  <!-- Bottom insight -->
  <rect x="30" y="270" width="810" height="34" rx="6" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-opacity="0.2"/>
  <text x="435" y="291" text-anchor="middle" fill="#93c5fd" font-size="11">Im dalej w cyklu Wardleya → tym więcej praktyk XP jest krytycznych → tym bardziej agent potrzebuje nadzoru</text>

  <!-- Boehm reminder -->
  <rect x="30" y="315" width="810" height="34" rx="6" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-opacity="0.2"/>
  <text x="435" y="336" text-anchor="middle" fill="#fcd34d" font-size="11">Krzywa Boehma [7]: koszt naprawy rośnie wykładniczo · Agent przyspiesza pisanie — nie przyspiesza feedbacku</text>

  <!-- Footer -->
  <text x="430" y="372" text-anchor="middle" fill="#475569" font-size="9">miedzykodem.dev · Między kodem a kulturą · 2026</text>
